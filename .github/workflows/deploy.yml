name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate build version
        id: version
        run: echo "BUILD_VERSION=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
      
      - name: Build
        run: npm run build:clean
        env:
          NEXT_PUBLIC_SITE_URL: https://yinpengpeng1027-code.github.io/ai-tools-nav
          NEXT_PUBLIC_BUILD_VERSION: ${{ steps.version.outputs.BUILD_VERSION }}
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

